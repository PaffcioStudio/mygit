<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mygit</title>
  <link rel="icon" type="image/x-icon" href="/mygit.ico">
  <link rel="shortcut icon" type="image/x-icon" href="/mygit.ico">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-theme">
  <script>var require = { paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } };</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    // marked v9 nie ma setOptions({ highlight }) — highlight robimy przez własny Renderer w explorer.js
    window.addEventListener('DOMContentLoaded', () => {
      if (window.marked) {
        marked.use({ breaks: true, gfm: true });
      }
    });
  </script>
</head>
<body>

<div id="app">

  <!-- ════════════════ SIDEBAR ════════════════ -->
  <aside id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">
        <img src="/mygit-logo.png" width="22" height="22" alt="mygit" style="display:block;border-radius:4px">
      </div>
      <span class="brand-text">mygit</span>
      <span class="brand-ver">v2</span>
    </div>

    <div class="sidebar-search">
      <div class="search-wrap">
        <svg class="search-icon" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="repoSearch" type="text" class="search-input" placeholder="Szukaj projektu… (Ctrl+K)">
      </div>
    </div>

    <div class="sidebar-filters">
      <div class="custom-select-wrap" id="categoryFilterWrap">
        <button class="custom-select-btn" id="categoryFilterBtn" onclick="window.toggleCustomSelect('category')">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
          <span id="categoryFilterLabel">Kategoria</span>
          <svg class="select-caret" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="custom-select-dropdown" id="categoryFilterDd"></div>
      </div>
      <div class="custom-select-wrap" id="sortFilterWrap">
        <button class="custom-select-btn" id="sortFilterBtn" onclick="window.toggleCustomSelect('sort')">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
          <span id="sortFilterLabel">Najnowsze</span>
          <svg class="select-caret" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="custom-select-dropdown" id="sortFilterDd"></div>
      </div>
      <!-- hidden native selects for JS compatibility -->
      <select id="categoryFilter" style="display:none"></select>
      <select id="sortFilter" style="display:none">
        <option value="newest">Najnowsze</option>
        <option value="oldest">Najstarsze</option>
        <option value="name">A-Z</option>
        <option value="size">Rozmiar</option>
        <option value="snapshots">Snapshoty</option>
      </select>
    </div>

    <div id="repoList" class="scroll-y flex-1">
      <div class="loading-row">
        <svg class="spin" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 12a9 9 0 11-6.219-8.56"/>
        </svg>
        Ładowanie…
      </div>
    </div>

    <div class="sidebar-footer">
      <span><span id="statusDot" class="status-dot loading"></span><span id="statusText">łączenie…</span></span>
    </div>
  </aside>

  <!-- ════════════════ MAIN ════════════════ -->
  <main id="main">

    <!-- Topbar -->
    <header id="topbar">
      <button id="nav_dashboard" class="topbar-nav-btn active" onclick="window.showView('dashboard')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
        </svg>
        Dashboard
      </button>
      <button id="nav_archive" class="topbar-nav-btn" onclick="window.showView('archive')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 8v13H3V8"/><rect x="1" y="3" width="22" height="5" rx="1"/>
          <line x1="10" y1="12" x2="14" y2="12"/>
        </svg>
        Archiwum
      </button>

      <div class="topbar-divider"></div>

      <div id="topbarPath" class="topbar-path">
        <span style="color:var(--text-muted)">mygit</span>
      </div>

      <div id="topbarActions" class="topbar-actions"></div>
    </header>

    <!-- Content -->
    <div id="content">

      <!-- Dashboard (domyślnie aktywny) -->
      <div id="dashView" class="view active">
        <div class="loading-row">Ładowanie dashboardu…</div>
      </div>

      <!-- Repo View (ukryty dopóki nie wybierzemy repo) -->
      <div id="repoView" class="view">

        <!-- Sub-header z snapshot pickerem -->
        <div class="repo-header">
          <div class="snapshot-picker">
            <button id="snapshotBtn" class="snapshot-btn">
              <svg class="snap-icon" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="3"/>
                <path d="M3 12a9 9 0 1 1 18 0A9 9 0 0 1 3 12z" opacity=".3"/>
              </svg>
              <span class="snap-label">Wybierz snapshot</span>
              <svg class="snap-caret" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </button>

            <div id="snapshotDropdown" class="snapshot-dropdown">
              <div class="snap-dd-search">
                <input id="snapDdSearchInput" type="text" placeholder="Szukaj snapshotu…">
              </div>
              <div id="snapDdList" class="snap-dd-list">
                <div class="loading-row" style="padding:20px">Brak snapshotów</div>
              </div>
            </div>
          </div>

          <div style="flex:1"></div>
          <span id="snapCount" style="font-size:11.5px;color:var(--text-muted)"></span>
        </div>

        <!-- Layout: explorer + notes panel -->
        <div class="repo-layout">
          <div class="explorer-main">
            <div id="commitBar" class="commit-bar">
              <span style="font-size:12.5px;color:var(--text-muted)">Wybierz snapshot aby przeglądać pliki</span>
            </div>
            <div id="explorerBreadcrumb" class="explorer-breadcrumb">
              <span class="breadcrumb-current" style="color:var(--text-muted)">—</span>
            </div>
            <div id="fileSearchBar" class="file-search-bar file-search-bar--hidden">
              <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input id="fileSearchInput" type="text" class="file-search-input" placeholder="Szukaj pliku… (Esc aby zamknąć)" autocomplete="off" spellcheck="false"/>
              <span id="fileSearchCount" class="file-search-count"></span>
              <button class="file-search-close" onclick="window.closeFileSearch()" title="Zamknij (Esc)">✕</button>
            </div>
            <div id="fileTable" class="file-table">
              <div class="empty-state" style="padding:60px">
                <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                  <path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3z" opacity=".3"/>
                </svg>
                <h3>Wybierz repozytorium</h3>
                <p>Kliknij projekt z listy po lewej stronie</p>
              </div>
            </div>
          </div>

          <div class="notes-panel" id="notesPanel">
            <div class="notes-header">
              <span class="notes-header-title">Metadane</span>
            </div>
            <div class="notes-body">
              <div class="empty-state" style="padding:24px 8px">
                <h3 style="font-size:12px">Wybierz projekt</h3>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- Archive View -->
      <div id="archiveView" class="view">
        <div class="loading-row">Ładowanie archiwum…</div>
      </div>

    </div>
  </main>
</div>

<!-- ════════════════ MODALS ════════════════ -->

<!-- Code modal -->
<div id="codeModal" class="modal-bg" onclick="if(event.target===this)window.closeCodeModal()">
  <div class="modal modal-xl" style="height:90vh">
    <div class="modal-head">
      <div>
        <div id="codeModalTitle" class="modal-title">Podgląd pliku</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:5px">
          <span id="codeModalLang" class="code-preview-lang"></span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button id="mdToggle" class="btn btn-sm" style="display:none">Podgląd</button>
        <button id="codeModalCopy" class="btn btn-sm">Kopiuj</button>
        <a id="codeModalDl" class="btn btn-sm" download>
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Pobierz
        </a>
        <button class="modal-close" onclick="window.closeCodeModal()">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="modal-body" style="padding:0;overflow:hidden;flex:1;display:flex;flex-direction:column">
      <div id="codeMonaco" style="flex:1;width:100%;height:100%"></div>
      <div id="codeMdPreview" style="display:none;flex:1"></div>
    </div>
  </div>
</div>

<!-- Media modal -->
<div id="mediaModal" class="modal-bg" onclick="if(event.target===this)window.closeMediaModal()">
  <div class="modal modal-xl">
    <div class="modal-head">
      <div id="mediaModalTitle" class="modal-title">Podgląd</div>
      <button class="modal-close" onclick="window.closeMediaModal()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="mediaModalBody" class="modal-body"></div>
  </div>
</div>

<!-- Confirm modal -->
<div id="confirmModal" class="modal-bg" onclick="if(event.target===this)window.closeConfirmModal()">
  <div class="modal modal-lg" id="confirmModalInner">
    <div class="modal-head">
      <div id="confirmTitle" class="modal-title">Potwierdź</div>
      <button class="modal-close" onclick="window.closeConfirmModal()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="confirmBody" class="modal-body"></div>
    <div class="modal-foot">
      <button class="btn" onclick="window.closeConfirmModal()">Anuluj</button>
      <button id="confirmOk" class="btn btn-danger">Potwierdź</button>
    </div>
  </div>
</div>

<div id="toastArea"></div>
<script type="module" src="/js/main.js"></script>
</body>
</html>
